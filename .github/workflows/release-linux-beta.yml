name: Linux Beta Release

on:
  push:
    tags:
      - 'linux-beta-v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release-linux-beta:
    name: Check, Build, and Publish Linux Beta Prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            libs/os_api -> target

      - name: Parse and validate Linux beta release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^linux-beta-v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            echo "Unexpected Linux beta tag format: $TAG" >&2
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          BETA_ITERATION="${BASH_REMATCH[2]}"
          DISPLAY_VERSION="${VERSION}-beta.${BETA_ITERATION}"
          CHANGELOG_PATH="changelogs/${TAG}.txt"
          RAW_BINARY_NAME="cpu-affinity-tool-linux-x86_64"
          ARCHIVE_NAME="${RAW_BINARY_NAME}.tar.gz"

          CARGO_VERSION="$(awk -F'\"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          if [[ -z "$CARGO_VERSION" ]]; then
            echo "Unable to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "Tag version $VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

          if [[ ! -f "$CHANGELOG_PATH" ]]; then
            echo "Missing Linux beta changelog: $CHANGELOG_PATH" >&2
            exit 1
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "beta_iteration=$BETA_ITERATION"
            echo "display_version=$DISPLAY_VERSION"
            echo "changelog_path=$CHANGELOG_PATH"
            echo "raw_binary_name=$RAW_BINARY_NAME"
            echo "archive_name=$ARCHIVE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --features linux --bin cpu-affinity-tool-linux -- -D warnings

      - name: Run os_api tests
        run: cargo test --manifest-path libs/os_api/Cargo.toml

      - name: Run Linux binary tests
        run: cargo test --features linux --bin cpu-affinity-tool-linux

      - name: Build Linux binary
        run: cargo build --release --features linux --bin cpu-affinity-tool-linux

      - name: Stage Linux beta assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR="artifacts/linux-beta"
          mkdir -p "$ARTIFACT_DIR"

          install -m755 \
            target/release/cpu-affinity-tool-linux \
            "$ARTIFACT_DIR/${{ steps.meta.outputs.raw_binary_name }}"

          tar -C "$ARTIFACT_DIR" \
            -czf "$ARTIFACT_DIR/${{ steps.meta.outputs.archive_name }}" \
            "${{ steps.meta.outputs.raw_binary_name }}"

          (
            cd "$ARTIFACT_DIR"
            sha256sum \
              "${{ steps.meta.outputs.raw_binary_name }}" \
              "${{ steps.meta.outputs.archive_name }}" \
              > SHA256SUMS.txt
          )

          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Create Linux beta prerelease
        uses: softprops/action-gh-release@v1
        with:
          name: CPU Affinity Tool Linux Beta v${{ steps.meta.outputs.display_version }}
          draft: false
          prerelease: true
          body_path: ${{ steps.meta.outputs.changelog_path }}
          files: |
            ${{ steps.assets.outputs.artifact_dir }}/${{ steps.meta.outputs.raw_binary_name }}
            ${{ steps.assets.outputs.artifact_dir }}/${{ steps.meta.outputs.archive_name }}
            ${{ steps.assets.outputs.artifact_dir }}/SHA256SUMS.txt
