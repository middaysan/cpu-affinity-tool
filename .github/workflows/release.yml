name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags that start with 'v', e.g., v1.0.0

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Check, Build, and Package Windows Binary
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate release metadata
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          if ($tag -notmatch '^v([0-9]+\.[0-9]+\.[0-9]+)$') {
            throw "Unexpected stable release tag format: $tag"
          }

          $version = $Matches[1]
          $cargoLine = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          if ($null -eq $cargoLine) {
            throw "Unable to read package version from Cargo.toml"
          }

          $cargoVersion = $cargoLine.Matches[0].Groups[1].Value
          if ($cargoVersion -ne $version) {
            throw "Tag version $version does not match Cargo.toml version $cargoVersion"
          }

          $changelogPath = "changelogs/v$version.txt"
          if (-not (Test-Path -LiteralPath $changelogPath)) {
            throw "Missing stable release changelog: $changelogPath"
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            libs/os_api -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --features windows --bin cpu-affinity-tool -- -D warnings

      - name: Run os_api tests
        run: cargo test --manifest-path libs/os_api/Cargo.toml

      - name: Run tests
        run: cargo test --features windows --bin cpu-affinity-tool

      - name: Build Windows binary
        run: cargo build --release --features windows --bin cpu-affinity-tool

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: windows-binary
          path: target/release/cpu-affinity-tool.exe
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Windows binary
        uses: actions/download-artifact@v8
        with:
          name: windows-binary
          path: ./artifacts/windows

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: CPU Affinity Tool v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          body_path: changelogs/v${{ steps.get_version.outputs.VERSION }}.txt
          files: |
            ./artifacts/windows/cpu-affinity-tool.exe
